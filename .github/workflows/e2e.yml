name: e2e

# Gated, not dark: nightly + pre-release + manual — NOT every PR (too slow/flaky).
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch: {}
  release:
    types: [created]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Bring up the full stack (app + postgres)
        run: |
          docker compose up -d --build
          # wait for the app to serve
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/healthz >/dev/null 2>&1; then
              echo "app is up"; break
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000/healthz

      - name: Run e2e
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -200

      - name: Upload Playwright trace/report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
