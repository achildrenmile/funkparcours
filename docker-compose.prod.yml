# Production stack on host-node-02. Mirrors the per-app cloudflared-container
# pattern already used on this host (oeradioat/status/wavelog): app + postgres
# on a private bridge network, plus a dedicated cloudflared container that owns
# this app's named tunnel and reaches the app by service name.
#
# cloudflared sits behind the "tunnel" profile so the base `up -d` (app+postgres)
# works before the tunnel credentials exist. Start it with:
#   docker compose -f docker-compose.prod.yml --profile tunnel up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: funkparcours-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - funkparcours-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: funkparcours-app:local
    container_name: funkparcours-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@funkparcours-db:5432/${POSTGRES_DB}
    # Loopback publish lets deploy.sh health-check the internal port.
    ports:
      - "127.0.0.1:3000:3000"
    # Also joined to the existing oeradioat tunnel network so the running
    # oeradioat-cloudflared can reach this app as http://funkparcours-app:3000
    # (we reuse that tunnel instead of running our own — see README).
    networks:
      - funkparcours-net
      - oeradioat-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: funkparcours-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - app
    networks:
      - funkparcours-net

volumes:
  pgdata:

networks:
  funkparcours-net:
    driver: bridge
  # the network of the existing oeradioat-cloudflared tunnel (reused for ingress)
  oeradioat-net:
    external: true
    name: oeradioat_oeradioat-network
